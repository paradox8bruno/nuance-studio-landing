<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecionando | Nuance Studio</title>
  <meta name="robots" content="noindex" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-11WXXV8Q03"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-11WXXV8Q03');
  </script>

  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(40, 77, 139, 0.28), transparent 30%),
        radial-gradient(circle at top right, rgba(197, 162, 93, 0.16), transparent 22%),
        linear-gradient(180deg, #09111d 0%, #070d16 100%);
      color: #f7f2e8;
      font: 16px/1.6 Inter, system-ui, sans-serif;
      padding: 24px;
      text-align: center;
    }

    .card {
      width: min(100%, 560px);
      padding: 28px 24px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(13, 21, 34, 0.82);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.36);
    }

    h1 {
      margin: 0 0 10px;
      font: 700 44px/.95 "EB Garamond", Georgia, serif;
      letter-spacing: -.04em;
    }

    p {
      margin: 0;
      color: rgba(247, 242, 232, 0.7);
    }

    a {
      color: #e8cb8e;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Redirecionando…</h1>
    <p>Se nada acontecer, abra <a id="fallbackLink" href="/">a página correta</a>.</p>
  </div>

  <script>
    const path = window.location.pathname;

    if (path.endsWith('/quiz')) {
      window.location.replace(`${path}/${window.location.search}${window.location.hash}`);
    } else {
      const base = path.replace(/\/404\.html$/, '/');
      document.getElementById('fallbackLink').href = base;
    }
  </script>
</body>
</html>
